<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postar - RB BLOGS</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #24292e; }
        input, textarea { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .voltar { display: block; text-align: center; margin-top: 15px; color: #65676b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Nova Postagem</h2>
        <form action="/postar" method="post" enctype="multipart/form-data">
            <textarea name="descricao" placeholder="O que você está pensando? (Opcional)" rows="4"></textarea>
            <p style="font-size: 0.8em; color: #666;">Selecione uma Foto ou Vídeo (opcional):</p>
            <input type="file" name="arquivo" accept="image/*,video/*">
            <button type="submit">PUBLICAR NO RB BLOGS</button>
        </form>
        <a href="/" class="voltar">Cancelar e Voltar</a>
    </div>
</body>
</html>
