<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - ELITE MODS HUB</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card-pagamento { background: #1a1a1a; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; max-width: 400px; width: 100%; border: 1px solid #333; }
        h2 { color: #25d366; margin-bottom: 10px; font-size: 1.6em; }
        p { color: #aaa; font-size: 1.1em; line-height: 1.4; }
        .valor { font-size: 2.5em; font-weight: bold; color: #25d366; margin: 20px 0; text-shadow: 0 0 10px rgba(37, 211, 102, 0.3); }
        .pix-box { background: #252525; border: 2px dashed #25d366; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .qr-code { background: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; width: 200px; height: 200px; }
        .pix-codigo { word-break: break-all; font-family: monospace; font-size: 0.85em; color: #888; margin-bottom: 15px; display: block; line-height: 1.2; }
        .btn-copiar { background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-whatsapp { background: #25d366; color: black; border: none; padding: 20px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.2em; text-decoration: none; display: block; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); }
        .instrucao { font-size: 0.85em; color: #ff4444; margin-top: 20px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card-pagamento">
    <h2>Acesso Premium</h2>
    <p>Escaneie o QR Code ou copie o código para pagar:</p>
    <div class="valor">R$ 2,00</div>

    <div class="pix-box">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=00020126580014BR.GOV.BCB.PIX01361fad60f6-79cc-47a1-a87e-2e342fb1a63152040000530398654042.005802BR5921Alisson da Cruz Silva6009SAO PAULO62140510gHJwSy2tey6304628A" class="qr-code">
        <span class="pix-codigo" id="pixCode">00020126580014BR.GOV.BCB.PIX01361fad60f6-79cc-47a1-a87e-2e342fb1a63152040000530398654042.005802BR5921Alisson da Cruz Silva6009SAO PAULO62140510gHJwSy2tey6304628A</span>
        <button class="btn-copiar" onclick="copiarPix()">Copiar Código Pix</button>
    </div>

    <a href="https://w.app/fp02po" target="_blank" class="btn-whatsapp" onclick="avisarPagamento()">
        ✅ JÁ PAGUEI! LIBERAR ACESSO
    </a>

    <p class="instrucao">Envie o comprovante no WhatsApp!</p>
</div>

<script>
    async function avisarPagamento() {
        await fetch('/pedir_ativacao');
    }

    function copiarPix() {
        const text = document.getElementById('pixCode').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Código copiado!");
        });
    }
</script>

</body>
</html>
