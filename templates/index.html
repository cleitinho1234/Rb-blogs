<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RB BLOGS</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .main-container { width: 100%; max-width: 650px; padding: 15px; }
        header { background: #24292e; color: white; padding: 20px; text-align: center; width: 100%; margin-bottom: 20px; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .btn-adm { display: block; background: #28a745; color: white; padding: 15px; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
        
        /* Estilo do Microfone */
        #btn-microfone { 
            width: 80px; height: 80px; border-radius: 50%; border: none; 
            background: #007bff; color: white; font-size: 30px; cursor: pointer; 
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .ouvindo { background: #ff4757 !important; transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 71, 87, 0.6) !important; }
    </style>
</head>
<body>
    <header><h1>RB BLOGS</h1></header>
    <div class="main-container">
        {% if user and e_admin %}
            <a href="/postar" class="btn-adm">+ NOVA POSTAGEM</a>
            
            <div class="card" style="text-align: center; border: 2px solid #007bff; padding: 20px;">
                <h3>🎙️ Assistente RB (Voz)</h3>
                <p id="status-ia" style="font-size: 0.9em; color: #666;">Toque no microfone e fale</p>
                <button id="btn-microfone" aria-label="Microfone">🎤</button>
                <div id="resposta-ia" style="margin-top: 15px; padding: 10px; font-style: italic; color: #333; min-height: 30px;"></div>
            </div>
        {% endif %}
    </div>

    <script>
        const API_KEY = 'AIzaSyDmGhd3C3J-IkjfO8CuGqbWzNm6H7LA1wY'; 
        const btnMic = document.getElementById('btn-microfone');
        const statusIa = document.getElementById('status-ia');
        const respostaIa = document.getElementById('resposta-ia');

        let gravando = false;

        async function falarComIA(pergunta) {
            statusIa.innerText = "IA pensando...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: pergunta }] }] })
                });
                const data = await response.json();
                const textoResposta = data.candidates[0].content.parts[0].text;
                respostaIa.innerText = textoResposta;
                statusIa.innerText = "Pronto!";
                
                const fala = new SpeechSynthesisUtterance(textoResposta);
                fala.lang = 'pt-BR'; window.speechSynthesis.speak(fala);
            } catch (error) { statusIa.innerText = "Erro ao conectar com a IA."; }
        }

        const Reconhecimento = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (Reconhecimento) {
            const recognition = new Reconhecimento();
            recognition.lang = 'pt-BR';
            recognition.interimResults = false;

            btnMic.onclick = () => {
                if (!gravando) {
                    try {
                        recognition.start();
                    } catch (e) { console.error(e); }
                } else {
                    recognition.stop(); // Se clicar de novo, ele para a gravação corretamente
                }
            };

            recognition.onstart = () => {
                gravando = true;
                btnMic.classList.add('ouvindo');
                statusIa.innerText = "Estou ouvindo... fale agora.";
                respostaIa.innerText = "";
            };

            recognition.onresult = (e) => {
                const fala = e.results[0][0].transcript;
                respostaIa.innerText = "Você: " + fala;
                falarComIA(fala);
            };

            recognition.onerror = (event) => {
                gravando = false;
                btnMic.classList.remove('ouvindo');
                if (event.error === 'not-allowed') {
                    statusIa.innerText = "Erro: Microfone bloqueado no navegador.";
                } else {
                    statusIa.innerText = "Erro: " + event.error;
                }
            };

            recognition.onend = () => {
                gravando = false;
                btnMic.classList.remove('ouvindo');
                if (statusIa.innerText === "Estou ouvindo... fale agora.") {
                    statusIa.innerText = "Clique para falar novamente";
                }
            };

        } else {
            statusIa.innerText = "Seu navegador não suporta comandos de voz.";
        }
    </script>
</body>
</html>
